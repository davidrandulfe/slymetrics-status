owner: davidrandulfe
repo: slymetrics-status

sites:
  - name: SlyMetrics App
    url: https://slymetrics.com

  - name: Webhook Proxy
    url: https://webhooks.slymetrics.com
    expectedStatusCodes:
      - 200
      - 405

  - name: Webhook Leads
    url: https://tnbsttlqzpbrfofdhhoq.supabase.co/functions/v1/webhook-leads
    method: POST
    headers:
      - "Content-Type: application/json"
    body: '{"email":"healthcheck@test.com"}'
    expectedStatusCodes:
      - 401
      - 400

  - name: Webhook Calls
    url: https://tnbsttlqzpbrfofdhhoq.supabase.co/functions/v1/webhook-calls
    method: POST
    headers:
      - "Content-Type: application/json"
    body: '{"email":"healthcheck@test.com"}'
    expectedStatusCodes:
      - 401
      - 400

  - name: Webhook Sales
    url: https://tnbsttlqzpbrfofdhhoq.supabase.co/functions/v1/webhook-sales
    method: POST
    headers:
      - "Content-Type: application/json"
    body: '{"email":"healthcheck@test.com"}'
    expectedStatusCodes:
      - 401
      - 400

  - name: Supabase Database
    url: https://tnbsttlqzpbrfofdhhoq.supabase.co/rest/v1/
    headers:
      - "apikey: $SUPABASE_ANON_KEY"
    expectedStatusCodes:
      - 200

status-website:
  cname: status.slymetrics.com
  name: SlyMetrics Status
  theme: dark
  logoUrl: https://slymetrics.com/favicon.ico
  navbar:
    - title: Homepage
      href: https://slymetrics.com

notifications:
  - type: email
    address: $NOTIFICATION_EMAIL
  - type: slack
    channel: $SLACK_CHANNEL_ID
    webhookUrl: $SLACK_WEBHOOK_URL
